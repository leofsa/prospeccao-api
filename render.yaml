services:
  # ── API FastAPI ──────────────────────────────────────────────────────────
  - type: web
    name: prospeccao-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python prepare_data.py
    startCommand: uvicorn servidor:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # Você preenche no dashboard do Render
      - key: DATA_CSV_URL
        value: https://github.com/leofsa/prospeccao-api/releases/download/v1.0/PDA_Dados_Cursos_Graduacao_Brasil.csv

  # ── Dashboard estático ───────────────────────────────────────────────────
  - type: web
    name: prospeccao-dashboard
    env: static
    staticPublishPath: ./public
    buildCommand: echo "Dashboard pronto"
